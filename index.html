// Variables globales de sesión
let currentWorld  = 1;
let playerHealth  = 100;   // persiste entre mundos; se resetea al volver al M1

// ================================================================
//  FIELD HERO — La Ruta del Técnico
//  F2O Training Game — Schneider Electric
//
//  Escenas:
//    BootScene     — genera todas las texturas por código
//    TitleScene    — pantalla de título
//    BriefingScene — briefing dinámico (lee WORLD_DATA[currentWorld])
//    GameScene     — nivel jugable (Mundo 1 implementado)
//    QuizScene     — overlay de pregunta
//    SummaryScene  — resumen de puntuación + hit rate
// ================================================================


// ================================================================
//  BOOT SCENE
//  Genera todas las texturas programáticamente y registra
//  animaciones globales. Al terminar lanza TitleScene.
// ================================================================
class BootScene extends Phaser.Scene {
    constructor() { super({ key: 'BootScene' }); }

    create() {

        // --- Utilidades de dibujo ---------------------------------

        /** Rellena un rectángulo en un CanvasRenderingContext2D */
        const r = (ctx, x, y, w, h, color) => {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        };

        /** Crea CanvasTexture limpia; devuelve { tex, ctx } */
        const mkTex = (key, w, h) => {
            const tex = this.textures.createCanvas(key, w, h);
            const ctx = tex.getContext();
            ctx.clearRect(0, 0, w, h);
            return { tex, ctx };
        };

        // --- TÉCNICO (función base compartida) --------------------
        //  legLX / legRX: X de inicio de pierna izq / der (8px ancho)
        const drawTechnico = (ctx, legLX, legRX) => {
            // Casco verde SE (rows 0-5)
            r(ctx,  8,  0, 16,  1, '#2a9e40');   // cima oscura
            r(ctx,  6,  1, 20,  5, '#3DCD58');   // cuerpo casco
            r(ctx,  5,  5, 22,  1, '#2a9e40');   // visera

            // Cara piel (rows 6-11)
            r(ctx,  8,  6, 16,  6, '#f0c8a0');
            r(ctx, 10,  8,  3,  2, '#1a1a1a');   // ojo izq
            r(ctx, 19,  8,  3,  2, '#1a1a1a');   // ojo der
            r(ctx, 12, 11,  8,  1, '#c8a080');   // boca

            // Cuello (rows 12-13)
            r(ctx, 13, 12,  6,  2, '#f0c8a0');

            // Chaleco naranja (rows 14-23)
            r(ctx,  4, 14, 24, 10, '#f0a030');
            r(ctx,  4, 16, 24,  2, '#3DCD58');   // franja reflectante 1
            r(ctx,  4, 20, 24,  2, '#3DCD58');   // franja reflectante 2
            r(ctx,  1, 14,  3,  8, '#f0a030');   // brazo izq
            r(ctx, 28, 14,  3,  8, '#f0a030');   // brazo der
            r(ctx,  1, 21,  3,  2, '#7a7a8e');   // guante izq
            r(ctx, 28, 21,  3,  2, '#7a7a8e');   // guante der

            // Pantalón azul (rows 24-29)
            r(ctx, legLX, 24,  8,  6, '#4080d0');
            r(ctx, legRX, 24,  8,  6, '#4080d0');

            // Botas marrón (rows 30-31, 1px más anchas)
            r(ctx, legLX - 1, 30, 10,  2, '#8b6040');
            r(ctx, legRX - 1, 30, 10,  2, '#8b6040');
        };

        // tech_stand — posición neutra
        { const { tex, ctx } = mkTex('tech_stand', 32, 32); drawTechnico(ctx, 6, 18); tex.refresh(); }

        // tech_walk1 — pierna izquierda adelantada
        { const { tex, ctx } = mkTex('tech_walk1', 32, 32); drawTechnico(ctx, 4, 20); tex.refresh(); }

        // tech_walk2 — pierna derecha adelantada
        { const { tex, ctx } = mkTex('tech_walk2', 32, 32); drawTechnico(ctx, 8, 16); tex.refresh(); }

        // --- LEAD VÁLIDO — bombilla verde 16x16 ------------------
        {
            const { tex, ctx } = mkTex('lead_valid', 16, 16);
            r(ctx,  4,  0,  8,  2, '#6de882');
            r(ctx,  2,  2, 12,  2, '#6de882');
            r(ctx,  1,  4, 14,  5, '#6de882');
            r(ctx,  2,  9, 12,  2, '#6de882');
            r(ctx,  4, 11,  8,  2, '#6de882');
            r(ctx,  5, 12,  6,  1, '#f0a030');  // casquillo
            r(ctx,  4, 13,  8,  1, '#f0a030');
            r(ctx,  5, 14,  6,  1, '#f0a030');
            r(ctx,  3,  3,  3,  1, '#ffffff');  // reflejo
            r(ctx,  2,  4,  2,  2, '#ffffff');
            r(ctx,  6,  4,  4,  4, '#b0f5c0');  // brillo central
            tex.refresh();
        }

        // --- LEAD INVÁLIDO — esfera roja 16x16 con X blanca ------
        {
            const { tex, ctx } = mkTex('lead_invalid', 16, 16);
            r(ctx,  4,  0,  8,  2, '#e84057');
            r(ctx,  2,  2, 12, 12, '#e84057');
            r(ctx,  4, 14,  8,  2, '#e84057');
            r(ctx,  0,  4, 16,  8, '#e84057');
            for (let i = 0; i < 7; i++) r(ctx, 4 + i, 4 + i, 2, 2, '#ffffff');  // diagonal \
            for (let i = 0; i < 7; i++) r(ctx, 10 - i, 4 + i, 2, 2, '#ffffff'); // diagonal /
            tex.refresh();
        }

        // --- TILE SUELO — baldosa industrial 32x32 ---------------
        {
            const { tex, ctx } = mkTex('tile_floor', 32, 32);
            r(ctx,  0,  0, 32, 32, '#4a4a5e');  // base
            r(ctx,  0,  0, 32,  1, '#3a3a4a');  // bordes
            r(ctx,  0,  0,  1, 32, '#3a3a4a');
            r(ctx, 31,  0,  1, 32, '#3a3a4a');
            r(ctx,  0, 31, 32,  1, '#3a3a4a');
            r(ctx,  0,  0, 32,  3, '#f0d020');  // franja seg. amarilla
            tex.refresh();
        }

        // --- TILE PLATAFORMA — pasarela metálica 32x32 -----------
        {
            const { tex, ctx } = mkTex('tile_platform', 32, 32);
            r(ctx,  0,  0, 32, 32, '#8a9aaa');
            r(ctx,  0,  6, 32,  1, '#7a8a9a');  // líneas metálicas
            r(ctx,  0, 12, 32,  1, '#7a8a9a');
            r(ctx,  0, 18, 32,  1, '#7a8a9a');
            r(ctx,  0, 24, 32,  1, '#7a8a9a');
            r(ctx,  0,  0, 32,  3, '#6a7a8a');  // refuerzo superior
            r(ctx,  0, 30, 32,  2, '#5a6a7a');  // borde inferior
            tex.refresh();
        }

        // --- CUADRO ELÉCTRICO NORMAL — 48x64 ---------------------
        {
            const { tex, ctx } = mkTex('equip_panel', 48, 64);
            r(ctx,  0,  0, 48, 64, '#5a6a7a');
            r(ctx,  0,  0, 48,  2, '#3a4a5a');  // marcos
            r(ctx,  0,  0,  2, 64, '#3a4a5a');
            r(ctx, 46,  0,  2, 64, '#3a4a5a');
            r(ctx,  0, 62, 48,  2, '#3a4a5a');
            r(ctx, 23,  8,  2, 52, '#4a5a6a');  // línea central (puerta)
            r(ctx,  7,  5,  5,  4, '#3DCD58');  // LED verde
            r(ctx, 21,  5,  5,  4, '#e84057');  // LED rojo
            r(ctx, 36,  5,  5,  4, '#f0a030');  // LED naranja
            // Breakers (2 columnas x 3 filas)
            [16, 28, 40].forEach(y => {
                r(ctx,  7, y, 13,  8, '#1a1a2e');
                r(ctx, 27, y, 13,  8, '#1a1a2e');
                r(ctx, 11, y + 1,  3,  6, '#7a7a8e');
                r(ctx, 31, y + 1,  3,  6, '#7a7a8e');
            });
            tex.refresh();
        }

        // --- CUADRO CON ÓXIDO (Quiz 1) — 48x64 ------------------
        {
            const { tex, ctx } = mkTex('equip_panel_rust', 48, 64);
            r(ctx,  0,  0, 48, 64, '#5a6a7a');
            r(ctx,  0,  0, 48,  2, '#3a4a5a');
            r(ctx,  0,  0,  2, 64, '#3a4a5a');
            r(ctx, 46,  0,  2, 64, '#3a4a5a');
            r(ctx,  0, 62, 48,  2, '#3a4a5a');
            r(ctx, 23,  8,  2, 52, '#4a5a6a');
            r(ctx,  7,  5,  5,  4, '#f0a030');  // LEDs de alerta
            r(ctx, 21,  5,  5,  4, '#e84057');
            r(ctx, 36,  5,  5,  4, '#e84057');
            [16, 28, 40].forEach(y => {
                r(ctx,  7, y, 13,  8, '#1a1a2e');
                r(ctx, 27, y, 13,  8, '#1a1a2e');
                r(ctx, 11, y + 1,  3,  6, '#7a7a8e');
                r(ctx, 31, y + 1,  3,  6, '#7a7a8e');
            });
            // Manchas de óxido
            r(ctx,  4, 18,  9,  6, '#8b6040');
            r(ctx, 28, 32, 12,  9, '#8b6040');
            r(ctx, 13, 48,  8, 10, '#8b6040');
            r(ctx, 36, 10,  7,  8, '#8b6040');
            r(ctx,  5, 20,  4,  2, '#6a4020');
            r(ctx, 30, 35,  6,  3, '#6a4020');
            tex.refresh();
        }

        // --- TORRE UPS — 36x64 -----------------------------------
        {
            const { tex, ctx } = mkTex('equip_ups', 36, 64);
            r(ctx,  0,  0, 36, 64, '#3a4a5a');
            r(ctx,  0,  0, 36,  2, '#2a3a4a');
            r(ctx,  0,  0,  2, 64, '#2a3a4a');
            r(ctx, 34,  0,  2, 64, '#2a3a4a');
            r(ctx,  0, 62, 36,  2, '#2a3a4a');
            r(ctx,  4,  4, 28, 16, '#1a2a1a');  // pantalla fondo
            r(ctx,  5,  5, 26, 14, '#3DCD58');  // pantalla brillo
            r(ctx,  6,  6, 24, 12, '#2a9e40');  // pantalla interior
            r(ctx,  8,  8,  5,  8, '#6de882');  // chars simulados
            r(ctx, 15,  8,  5,  8, '#6de882');
            r(ctx, 22,  8,  5,  8, '#6de882');
            for (let gy = 24; gy < 56; gy += 6) r(ctx, 4, gy, 28, 3, '#2a3a4a');  // rejillas
            r(ctx, 15, 56,  6,  4, '#3DCD58');  // LED estado
            tex.refresh();
        }

        // --- CHARCO DE AGUA — peligro 48x12 ----------------------
        {
            const { tex, ctx } = mkTex('hazard_water', 48, 12);
            ctx.globalAlpha = 0.55;
            r(ctx,  4,  1, 40, 10, '#4488cc');
            r(ctx,  0,  3, 48,  6, '#4488cc');
            r(ctx,  8,  0, 32, 12, '#4488cc');
            ctx.globalAlpha = 0.65;
            r(ctx, 10,  2, 16,  2, '#aaddff');  // reflejo
            r(ctx, 14,  2,  8,  1, '#ffffff');
            ctx.globalAlpha = 1.0;
            tex.refresh();
        }

        // --- RACK DE SERVIDORES — 36x80 --------------------------
        {
            const { tex, ctx } = mkTex('equip_rack', 36, 80);
            r(ctx,  0,  0, 36, 80, '#1a1a2e');   // chasis negro
            r(ctx,  0,  0, 36,  2, '#2a2a3a');   // bordes
            r(ctx,  0,  0,  2, 80, '#2a2a3a');
            r(ctx, 34,  0,  2, 80, '#2a2a3a');
            r(ctx,  0, 78, 36,  2, '#2a2a3a');
            r(ctx,  2,  2,  3, 76, '#2a3a4a');   // raíl izq
            r(ctx, 31,  2,  3, 76, '#2a3a4a');   // raíl der
            // 6 unidades de servidor (12px cada una)
            const leds = ['#3DCD58','#3DCD58','#f0a030','#3DCD58','#e84057','#3DCD58'];
            for (let i = 0; i < 6; i++) {
                const sy = 4 + i * 12;
                r(ctx,  5, sy, 26, 10, '#0d0d1a');   // slot
                r(ctx,  5, sy, 26,  1, '#1a2a3a');   // separador
                r(ctx,  6, sy+3,  6,  4, '#151525'); // bay 1
                r(ctx, 13, sy+3,  6,  4, '#151525'); // bay 2
                r(ctx, 27, sy+3,  2,  2, leds[i]);   // LED actividad
                r(ctx, 27, sy+6,  2,  2, '#3DCD58'); // LED power
            }
            tex.refresh();
        }

        // --- UNIDAD COOLING — 48x48 ------------------------------
        {
            const { tex, ctx } = mkTex('equip_cooling', 48, 48);
            r(ctx,  0,  0, 48, 48, '#5a6a7a');   // cuerpo
            r(ctx,  0,  0, 48,  2, '#3a4a5a');
            r(ctx,  0,  0,  2, 48, '#3a4a5a');
            r(ctx, 46,  0,  2, 48, '#3a4a5a');
            r(ctx,  0, 46, 48,  2, '#3a4a5a');
            r(ctx,  8,  8, 32, 32, '#3a4a5a');   // housing ventilador
            r(ctx, 10, 10, 28, 28, '#2a3a4a');
            // Aspas del ventilador (4 direcciones)
            r(ctx, 21,  4,  6, 18, '#4a5a6a');   // aspa vertical
            r(ctx,  4, 21, 18,  6, '#4a5a6a');   // aspa horizontal
            r(ctx, 27, 21, 18,  6, '#4a5a6a');   // aspa horizontal der
            r(ctx, 21, 27,  6, 18, '#4a5a6a');   // aspa vertical bajo
            r(ctx, 19, 19, 10, 10, '#6a7a8a');   // cubo central
            // Rejilla lateral izq/der
            for (let i = 0; i < 4; i++) {
                r(ctx, 2, 8 + i * 8, 5, 3, '#4a5a6a');
                r(ctx, 41, 8 + i * 8, 5, 3, '#4a5a6a');
            }
            r(ctx, 43,  3,  3,  3, '#3DCD58');   // LED estado
            tex.refresh();
        }

        // --- UPS CON BATERÍAS VIEJAS — 36x64 ---------------------
        {
            const { tex, ctx } = mkTex('equip_ups_old', 36, 64);
            r(ctx,  0,  0, 36, 64, '#3a4a5a');
            r(ctx,  0,  0, 36,  2, '#2a3a4a');
            r(ctx,  0,  0,  2, 64, '#2a3a4a');
            r(ctx, 34,  0,  2, 64, '#2a3a4a');
            r(ctx,  0, 62, 36,  2, '#2a3a4a');
            r(ctx,  4,  4, 28, 16, '#2a1a0a');   // pantalla fondo — rojo/naranja
            r(ctx,  5,  5, 26, 14, '#f0a030');   // pantalla naranja (alerta baterías)
            r(ctx,  6,  6, 24, 12, '#c07010');
            r(ctx,  8,  8, 20,  3, '#f0d020');   // barra de advertencia
            r(ctx,  8, 13,  8,  2, '#e84057');   // indicador BATT bajo
            r(ctx, 18, 13,  8,  2, '#e84057');
            for (let gy = 24; gy < 56; gy += 6) r(ctx, 4, gy, 28, 3, '#2a3a4a');
            r(ctx, 15, 56,  6,  4, '#e84057');   // LED alerta rojo
            tex.refresh();
        }

        // --- DESCARGA ELÉCTRICA — peligro 40x12 ------------------
        {
            const { tex, ctx } = mkTex('hazard_sparks', 40, 12);
            ctx.globalAlpha = 0.75;
            r(ctx, 2, 2, 36, 8, '#1a1a0a');       // base oscuro
            ctx.globalAlpha = 1.0;
            // Rayo en zigzag (amarillo con núcleo blanco)
            for (let i = 0; i < 5; i++) {
                const bx = 5 + i * 6;
                r(ctx, bx,     2, 3, 4, '#f0d020');
                r(ctx, bx + 3, 5, 3, 4, '#f0d020');
                r(ctx, bx + 1, 3, 1, 2, '#ffffff'); // núcleo blanco
            }
            tex.refresh();
        }

        // --- SUELO DATA CENTRE — 32x32 ---------------------------
        {
            const { tex, ctx } = mkTex('tile_floor_dc', 32, 32);
            r(ctx,  0,  0, 32, 32, '#5a5a6a');   // base más clara
            r(ctx,  0,  0, 32,  1, '#4a4a5a');   // bordes
            r(ctx,  0,  0,  1, 32, '#4a4a5a');
            r(ctx, 31,  0,  1, 32, '#4a4a5a');
            r(ctx,  0, 31, 32,  1, '#4a4a5a');
            r(ctx, 15,  1,  1, 30, '#4a4a5a');   // grid vertical
            r(ctx,  1, 15, 30,  1, '#4a4a5a');   // grid horizontal
            r(ctx,  3,  3, 10, 10, '#525262');   // panel elevado A
            r(ctx, 19,  3, 10, 10, '#525262');   // panel elevado B
            r(ctx,  3, 19, 10, 10, '#525262');   // panel elevado C
            r(ctx, 19, 19, 10, 10, '#525262');   // panel elevado D
            r(ctx,  0,  0, 32,  3, '#3a8a6a');   // franja verde SE
            tex.refresh();
        }

        // --- CELDA DE MEDIA TENSIÓN — 56x72 ----------------------
        {
            const { tex, ctx } = mkTex('equip_celda_hv', 56, 72);
            r(ctx,  0,  0, 56, 72, '#3a4a5a');   // cuerpo gris oscuro
            r(ctx,  0,  0, 56,  2, '#2a3a4a');   // bordes
            r(ctx,  0,  0,  2, 72, '#2a3a4a');
            r(ctx, 54,  0,  2, 72, '#2a3a4a');
            r(ctx,  0, 70, 56,  2, '#2a3a4a');
            // Puerta frontal
            r(ctx,  6, 10, 44, 52, '#2a3a4a');   // contorno puerta
            r(ctx,  8, 12, 40, 48, '#3a4a5a');   // interior puerta
            r(ctx, 46, 30,  4,  8, '#5a6a7a');   // manija derecha
            // Panel de indicadores superior
            r(ctx,  8,  4, 40,  4, '#1a2a3a');
            r(ctx, 10,  5,  4,  2, '#3DCD58');   // LED verde
            r(ctx, 24,  5,  4,  2, '#e84057');   // LED rojo
            r(ctx, 38,  5,  4,  2, '#f0a030');   // LED naranja
            // Triángulo peligro AT — amarillo con rayo
            ctx.fillStyle = '#f0d020';
            ctx.beginPath();
            ctx.moveTo(28, 18); ctx.lineTo(16, 40); ctx.lineTo(40, 40);
            ctx.closePath(); ctx.fill();
            r(ctx, 26, 22,  4, 12, '#1a1a2e');   // rayo negro
            r(ctx, 24, 34,  8,  4, '#1a1a2e');
            // Rejillas ventilación inferiores
            for (let gy = 56; gy < 66; gy += 4) r(ctx, 10, gy, 36, 2, '#2a3a4a');
            tex.refresh();
        }

        // --- TRANSFORMADOR — 64x56 --------------------------------
        {
            const { tex, ctx } = mkTex('equip_transformer', 64, 56);
            // Base gris
            r(ctx,  0, 44, 64, 12, '#4a4a5a');
            r(ctx,  0, 42, 64,  4, '#3a3a4a');
            // Cuerpo cobre/marrón
            r(ctx, 10,  6, 44, 38, '#c87830');
            r(ctx, 10,  6, 44,  2, '#a06020');   // borde sup
            r(ctx, 10,  6,  2, 38, '#a06020');   // borde izq
            r(ctx, 52,  6,  2, 38, '#a06020');   // borde der
            r(ctx, 10, 42, 44,  2, '#a06020');   // borde inf
            // Aletas refrigeración izq
            for (let i = 0; i < 5; i++) {
                r(ctx,  2, 10 + i * 6,  8,  4, '#8a6828');
                r(ctx,  4, 10 + i * 6,  4,  4, '#c87830');
            }
            // Aletas refrigeración der
            for (let i = 0; i < 5; i++) {
                r(ctx, 54, 10 + i * 6,  8,  4, '#8a6828');
                r(ctx, 54, 10 + i * 6,  4,  4, '#c87830');
            }
            // Bornes superiores (3 cilindros)
            r(ctx, 16,  0,  8,  8, '#7a8a9a');
            r(ctx, 28,  0,  8,  8, '#7a8a9a');
            r(ctx, 40,  0,  8,  8, '#7a8a9a');
            r(ctx, 19,  1,  2,  6, '#5a6a7a');
            r(ctx, 31,  1,  2,  6, '#5a6a7a');
            r(ctx, 43,  1,  2,  6, '#5a6a7a');
            // Panel central — visor
            r(ctx, 20, 18, 24, 16, '#1a2a3a');
            r(ctx, 22, 20, 20, 12, '#2a3a4a');
            r(ctx, 24, 22,  4,  3, '#3DCD58');
            r(ctx, 30, 22,  4,  3, '#f0d020');
            r(ctx, 36, 22,  4,  3, '#e84057');
            tex.refresh();
        }

        // --- ZONA DE ARCO ELÉCTRICO — 32x32 ----------------------
        {
            const { tex, ctx } = mkTex('hazard_electric', 32, 32);
            ctx.globalAlpha = 0.4;
            r(ctx, 0, 0, 32, 32, '#100800');
            ctx.globalAlpha = 1.0;
            // Rayos en X diagonal — amarillo con núcleo blanco
            for (let i = 0; i < 6; i++) {
                const bx = 2 + i * 5;
                r(ctx, bx,      2, 2, 8, '#f0d020');
                r(ctx, bx + 2, 10, 2, 8, '#f0d020');
                r(ctx, bx,     18, 2, 6, '#f0d020');
                r(ctx, bx + 1,  3, 1, 6, '#ffffff');
            }
            // Halo exterior sutil
            ctx.globalAlpha = 0.55;
            r(ctx,  0,  0, 32,  2, '#f0d020');
            r(ctx,  0, 30, 32,  2, '#f0d020');
            ctx.globalAlpha = 1.0;
            tex.refresh();
        }

        // --- SUELO SUBESTACIÓN HV — 32x32 ------------------------
        {
            const { tex, ctx } = mkTex('tile_floor_hv', 32, 32);
            r(ctx,  0,  0, 32, 32, '#3a3a4a');   // base muy oscura
            r(ctx,  0,  0, 32,  1, '#2a2a3a');
            r(ctx,  0,  0,  1, 32, '#2a2a3a');
            r(ctx, 31,  0,  1, 32, '#2a2a3a');
            r(ctx,  0, 31, 32,  1, '#2a2a3a');
            // Líneas de seguridad rojas
            r(ctx,  0,  0, 32,  4, '#5a1a1a');   // franja roja sup
            r(ctx,  2,  1, 28,  2, '#e84057');   // rayo rojo
            r(ctx,  6, 10, 20,  1, '#4a2020');   // línea interior sutil
            r(ctx,  6, 20, 20,  1, '#4a2020');
            tex.refresh();
        }

        // --- Animaciones globales --------------------------------
        this.anims.create({
            key: 'idle',
            frames: [{ key: 'tech_stand' }],
            frameRate: 1,
            repeat: -1
        });
        this.anims.create({
            key: 'walk',
            frames: [{ key: 'tech_walk1' }, { key: 'tech_walk2' }],
            frameRate: 8,
            repeat: -1
        });

        this.scene.start('TitleScene');
    }
}

// ================================================================
//  GAME SCENE — Mundo 1: Subestación LV
//  Jugador, plataformas, HUD y peligros activos.
//  Próximas iteraciones: leads válidos/inválidos, QuizScene.
// ================================================================
class GameScene extends Phaser.Scene {
    constructor() { super({ key: 'GameScene' }); }

    create(data) {
        const FONT = 'Courier New, Courier, monospace';

        // --------------------------------------------------------
        //  ESTADO DEL NIVEL
        // --------------------------------------------------------
        this.health           = playerHealth;   // persiste entre mundos
        this.leadsCollected   = 0;   // leads con respuesta correcta
        this.leadsAttempted   = 0;   // leads interactuados (correcto O fallado)
        this.leadsCorrect     = 0;   // alias explícito para hit rate
        this.leadsTotal       = 4;
        this.score            = 0;
        this.bonusEuros       = 0;
        this.timeLeft         = WORLD_DATA[currentWorld].tiempo;
        this.levelEnded       = false;
        this.inWater          = false;
        this.inSparks         = false;
        this.inElectric       = false;
        this.invalidsTouched  = 0;
        this.sparksGroup      = null;   // solo Mundo 2+
        this.electricGroup    = null;   // solo Mundo 3: zonas arco estático
        this.fallingArcs      = null;   // solo Mundo 3: arcos cayendo del techo
        this.fallingArcTimer  = null;
        this.worldWidth       = 2400;   // sobreescrito por _buildWorldN

        // --------------------------------------------------------
        //  CONSTRUIR EL NIVEL según currentWorld
        //  (establece floorGroup, platformGroup, hazardGroup,
        //   validLeads, invalidLeads y physics.world.setBounds)
        // --------------------------------------------------------
        if (currentWorld === 1)      this._buildWorld1(FONT);
        else if (currentWorld === 2) this._buildWorld2(FONT);
        else if (currentWorld === 3) this._buildWorld3(FONT);

        // --------------------------------------------------------
        //  JUGADOR
        // --------------------------------------------------------
        this.player = this.physics.add.sprite(80, 300, 'tech_stand');
        // NO setCollideWorldBounds — necesitamos que el jugador caiga
        // por los agujeros sin ser bloqueado por el límite inferior
        this.player.setCollideWorldBounds(false);
        this.player.play('idle');

        this.physics.add.collider(this.player, this.floorGroup);
        this.physics.add.collider(this.player, this.platformGroup);

        // Overlap con charcos: daño continuo mientras se pisa
        this.physics.add.overlap(this.player, this.hazardGroup, () => {
            this.inWater = true;
        });
        // Overlap con descargas eléctricas (Mundo 2+)
        if (this.sparksGroup) {
            this.physics.add.overlap(this.player, this.sparksGroup, () => {
                this.inSparks = true;
            });
        }
        // Overlap con zonas de arco eléctrico estático (Mundo 3)
        if (this.electricGroup) {
            this.physics.add.overlap(this.player, this.electricGroup, () => {
                this.inElectric = true;
            });
        }
        // Overlap con arcos cayendo del techo (Mundo 3)
        if (this.fallingArcs) {
            this.physics.add.overlap(this.player, this.fallingArcs, (player, arc) => {
                this.inElectric = true;
                arc.destroy();
            });
        }

        // (los leads inválidos se detectan por proximidad en update())

        // --------------------------------------------------------
        //  CÁMARA
        // --------------------------------------------------------
        // Cámara acotada a la zona visible (no baja hacia los agujeros)
        this.cameras.main.setBounds(0, 0, this.worldWidth, 450);
        this.cameras.main.startFollow(this.player, true, 0.12, 0.12);

        // --------------------------------------------------------
        //  CONTROLES
        // --------------------------------------------------------
        this.cursors  = this.input.keyboard.createCursorKeys();
        this.keyA     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
        this.keyD     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
        this.keyW     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
        this.keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        this.keyE     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
        this.keyESC   = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
        this.keyESC.on('down', () => { if (!this.levelEnded) this.scene.start('TitleScene'); });

        // --------------------------------------------------------
        //  TIMER — descuenta 1 segundo cada segundo
        // --------------------------------------------------------
        this.timerEvent = this.time.addEvent({
            delay: 1000,
            repeat: this.timeLeft - 1,
            callback: () => {
                if (this.levelEnded) return;
                this.timeLeft = Math.max(0, this.timeLeft - 1);
                this._updateTimerText();
                if (this.timeLeft <= 0) this._endLevel('timeout');
            }
        });

        // --------------------------------------------------------
        //  HUD — todos los elementos con setScrollFactor(0)
        // --------------------------------------------------------
        const hudGfx = this.add.graphics().setScrollFactor(0).setDepth(10);

        // Fondo semitransparente izquierda (SEGURIDAD + SCORE)
        hudGfx.fillStyle(0x000000, 0.50);
        hudGfx.fillRect(8, 6, 148, 44);

        // Fondo semitransparente centro (TIMER)
        hudGfx.fillStyle(0x000000, 0.50);
        hudGfx.fillRect(340, 6, 120, 22);

        // Fondo semitransparente derecha (LEADS / BONUS)
        hudGfx.fillStyle(0x000000, 0.50);
        hudGfx.fillRect(692, 6, 102, 30);

        // — Etiqueta SEGURIDAD —
        this.add.text(16, 9, 'SEGURIDAD', {
            fontSize: '9px', fill: '#3DCD58', fontFamily: FONT, fontStyle: 'bold'
        }).setScrollFactor(0).setDepth(11);

        // — Barra de vida (fondo + barra activa) —
        const BAR_X = 16, BAR_Y = 22, BAR_W = 120, BAR_H = 8;
        // Fondo de la barra (gris oscuro)
        const barBg = this.add.graphics().setScrollFactor(0).setDepth(11);
        barBg.fillStyle(0x333344);
        barBg.fillRect(BAR_X, BAR_Y, BAR_W, BAR_H);
        // Barra activa verde
        this.healthBar = this.add.graphics().setScrollFactor(0).setDepth(12);
        this._drawHealthBar();

        // — Score (izquierda, bajo barra de vida) —
        this.scoreText = this.add.text(16, 34, 'SCORE: 0', {
            fontSize: '9px', fill: '#e8e8f0', fontFamily: FONT
        }).setScrollFactor(0).setDepth(11);

        // — Texto del timer (centro) —
        this.timerText = this.add.text(400, 9, '05:00', {
            fontSize: '14px', fill: '#e8e8f0', fontFamily: FONT, fontStyle: 'bold'
        }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(11);

        // — LEADS y BONUS (derecha) —
        this.leadsText = this.add.text(698, 9,
            `LEADS: ${this.leadsCollected}/4`, {
            fontSize: '10px', fill: '#3DCD58', fontFamily: FONT
        }).setScrollFactor(0).setDepth(11);

        this.bonusText = this.add.text(698, 22,
            `BONUS: ${this.bonusEuros}€`, {
            fontSize: '10px', fill: '#f0a030', fontFamily: FONT
        }).setScrollFactor(0).setDepth(11);

        // --------------------------------------------------------
        //  PROMPT DE INSPECCIÓN — se reposiciona en update()
        //  En coordenadas de MUNDO (scrollFactor=1 por defecto)
        // --------------------------------------------------------
        this.inspectPrompt = this.add.text(0, 0, '[E] Inspeccionar', {
            fontSize: '10px', fill: '#6de882', fontFamily: FONT, fontStyle: 'bold',
            backgroundColor: '#000000bb', padding: { x: 5, y: 3 }
        }).setOrigin(0.5, 1).setVisible(false).setDepth(8);

        // --------------------------------------------------------
        //  EVENTO: resultado del quiz (emitido por QuizScene)
        //  off() primero para evitar listeners duplicados en reinicios
        // --------------------------------------------------------
        this.events.off('quiz-complete');
        this.events.on('quiz-complete', ({ correct }) => {
            this.leadsAttempted++;
            if (correct) {
                this.leadsCollected++;
                this.leadsCorrect++;
                this.score      += 100;
                this.bonusEuros += 230;
                // Popup "+230€" en la posición del lead recogido
                const pop = this.add.text(
                    this._pendingLeadX, this._pendingLeadY - 10, '+230€', {
                    fontSize: '13px', fill: '#f0a030',
                    fontFamily: 'Courier New, Courier, monospace', fontStyle: 'bold'
                }).setOrigin(0.5).setDepth(9);
                this.tweens.add({
                    targets: pop, y: pop.y - 45, alpha: 0,
                    duration: 1100, ease: 'Power2',
                    onComplete: () => { if (pop.active) pop.destroy(); }
                });
            }
            // Cuando se han interactuado todos los leads (correctos o fallados) → fin
            if (this.leadsAttempted >= this.leadsTotal) {
                this.time.delayedCall(900, () => this._endLevel('complete'));
            }
        });
    }

                    fontSize: '12px', fill: '#f0d020',
                    fontFamily: 'Courier New, Courier, monospace'
                }).setOrigin(0.5).setDepth(5);
                this.time.delayedCall(350, () => { if (warn.active) warn.destroy(); });
                this.time.delayedCall(2500, () => { if (arc && arc.active) arc.destroy(); });
            }
        });
    }

    // ------------------------------------------------------------
    //  HELPERS — actualizar HUD
    // ------------------------------------------------------------

    _drawHealthBar() {
        this.healthBar.clear();
        const pct = Phaser.Math.Clamp(this.health / 100, 0, 1);
        // Color de la barra: verde > amarillo > rojo según % vida
        const color = pct > 0.5 ? 0x3DCD58 : pct > 0.25 ? 0xf0d020 : 0xe84057;
        this.healthBar.fillStyle(color);
        this.healthBar.fillRect(16, 22, Math.floor(120 * pct), 8);
    }

    _updateTimerText() {
        const m = Math.floor(this.timeLeft / 60).toString().padStart(2, '0');
        const s = (this.timeLeft % 60).toString().padStart(2, '0');
        this.timerText.setText(`${m}:${s}`);
        // Parpadeo rojo en los últimos 30 segundos
        if (this.timeLeft <= 30) {
            this.timerText.setStyle({ fill: this.timeLeft % 2 === 0 ? '#e84057' : '#e8e8f0' });
        }
    }

    _endLevel(reason) {
        if (this.levelEnded) return;
        this.levelEnded = true;
        this.timerEvent.remove();
        if (this.fallingArcTimer) this.fallingArcTimer.remove();
        this.player.setVelocity(0, 0);
        this.inspectPrompt.setVisible(false);
        // Pequeña pausa antes de cambiar de escena para que el jugador vea el último estado
        this.time.delayedCall(600, () => {
            this.scene.start('SummaryScene', {
                completed:      reason === 'complete',
                leadsCollected: this.leadsCollected,
                leadsCorrect:   this.leadsCorrect,
                leadsTotal:     this.leadsTotal,
                invalidTouched: this.invalidsTouched,
                health:         Math.max(0, Math.round(this.health)),
                timeLeft:       this.timeLeft,
                score:          this.score,
                bonus:          this.bonusEuros
            });
        });
    }

    // ------------------------------------------------------------
    //  Recoge un lead válido, suma puntos y muestra popup de bonus
    // ------------------------------------------------------------
    _collectLead(lead) {
        if (!lead.alive) return;
        lead.alive = false;
        lead.setVisible(false);
        this.inspectPrompt.setVisible(false);
        // Guardar posición para el popup "+230€" tras el quiz
        this._pendingLeadX = lead.x;
        this._pendingLeadY = lead.y;
        // Pausar GameScene y lanzar QuizScene como overlay
        this.scene.pause('GameScene');
        this.scene.launch('QuizScene', { quizId: lead.quizId });
    }

    _touchInvalidLead(lead) {
        if (!lead.alive) return;
        lead.alive = false;
        lead.setVisible(false);
        this.invalidsTouched++;
        this.score  -= 50;              // puede ir a negativo
        this.health -= 20;
        this._drawHealthBar();
        this.cameras.main.flash(300, 255, 0, 0);
        const W = this.scale.width, H = this.scale.height;
        const FONT = 'Courier New, Courier, monospace';
        // Fondo semitransparente + razón del lead inválido en rojo
        const bg = this.add.graphics().setScrollFactor(0).setDepth(14);
        bg.fillStyle(0x000000, 0.70);
        bg.fillRect(80, H * 0.38, W - 160, 80);
        const msg = this.add.text(W / 2, H * 0.38 + 40, lead.reason, {
            fontSize: '14px', fill: '#e84057', fontFamily: FONT,
            align: 'center', fontStyle: 'bold', wordWrap: { width: W - 200 }
        }).setOrigin(0.5).setScrollFactor(0).setDepth(15);
        this.time.delayedCall(2500, () => {
            if (bg.active)  bg.destroy();
            if (msg.active) msg.destroy();
        });
    }

    // ------------------------------------------------------------
    //  UPDATE — loop principal
    // ------------------------------------------------------------
    update() {
        if (this.levelEnded) return;

        const body     = this.player.body;
        const onGround = body.blocked.down;

        // — Movimiento —
        const goLeft  = this.cursors.left.isDown  || this.keyA.isDown;
        const goRight = this.cursors.right.isDown || this.keyD.isDown;
        const doJump  = Phaser.Input.Keyboard.JustDown(this.cursors.up)
                     || Phaser.Input.Keyboard.JustDown(this.keyW)
                     || Phaser.Input.Keyboard.JustDown(this.keySpace);

        if (goLeft) {
            this.player.setVelocityX(-200);
            this.player.setFlipX(true);
            if (onGround) this.player.play('walk', true);
        } else if (goRight) {
            this.player.setVelocityX(200);
            this.player.setFlipX(false);
            if (onGround) this.player.play('walk', true);
        } else {
            this.player.setVelocityX(0);
            if (onGround) this.player.play('idle', true);
        }
        if (doJump && onGround) this.player.setVelocityY(-416);

        // — Caída por agujero —
        if (this.player.y > 460 && !this.levelEnded) {
            this.health = 0;
            // Mostrar mensaje de seguridad antes de terminar
            const W = this.scale.width, H = this.scale.height;
            const FONT = 'Courier New, Courier, monospace';
            const fallGfx = this.add.graphics().setScrollFactor(0).setDepth(25);
            fallGfx.fillStyle(0x000000, 0.75);
            fallGfx.fillRect(0, 0, W, H);
            this.add.text(W / 2, H * 0.40, '⚠ ACCIDENTE DE ALTURA', {
                fontSize: '20px', fill: '#e84057', fontFamily: FONT, fontStyle: 'bold'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(26);
            this.add.text(W / 2, H * 0.54,
                'Recuerda: antes de trabajar en altura\n' +
                'usa arnés, delimita la zona y señaliza.', {
                fontSize: '12px', fill: '#f0d020', fontFamily: FONT,
                align: 'center', lineSpacing: 5
            }).setOrigin(0.5).setScrollFactor(0).setDepth(26);
            // Opción de reiniciar el nivel
            const restartBlink = this.add.text(W / 2, H * 0.72, '▶  ENTER para reiniciar el nivel', {
                fontSize: '13px', fill: '#6de882', fontFamily: FONT
            }).setOrigin(0.5).setScrollFactor(0).setDepth(26);
            this.tweens.add({
                targets: restartBlink, alpha: 0.15, duration: 500,
                yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
            });
            this.time.delayedCall(300, () => {
                this.input.keyboard.once('keydown-ENTER', () => {
                    playerHealth = 100;
                    currentWorld = 1;
                    this.scene.start('BriefingScene');
                });
            });
            this.levelEnded = true;
            return;
        }

        // — Evitar que el jugador salga por los laterales —
        if (this.player.x < 16)                       this.player.setX(16);
        if (this.player.x > this.worldWidth - 16)     this.player.setX(this.worldWidth - 16);

        // — Destruir arcos que lleguen al suelo (Mundo 3) —
        if (this.fallingArcs) {
            this.fallingArcs.getChildren().forEach(arc => {
                if (arc.active && arc.y > 440) arc.destroy();
            });
        }

        // — Peligros continuos —
        if (this.inWater) {
            this.health -= 0.3;
            if (this.health <= 0) { this.health = 0; this._endLevel('gameover'); }
        }
        if (this.inSparks) {
            this.health -= 0.5;   // descarga eléctrica — más dañina que el charco
            if (this.health <= 0) { this.health = 0; this._endLevel('gameover'); }
        }
        if (this.inElectric) {
            this.health -= 10;    // arco HV — 10% de vida por frame de contacto
            if (this.health <= 0) { this.health = 0; this._endLevel('gameover'); }
        }
        // Tinte del jugador según peligro activo
        this.player.setTint(
            this.inElectric ? 0xffff44 :
            this.inSparks   ? 0xffdd00 :
            this.inWater    ? 0xff6666 : 0xffffff
        );
        this.inWater    = false;   // se reactiva vía overlap si sigue en contacto
        this.inSparks   = false;
        this.inElectric = false;

        // — Detección de proximidad: leads válidos —
        let nearLead = null;
        this.validLeads.forEach(lead => {
            if (!lead.alive) return;
            const dist = Phaser.Math.Distance.Between(
                this.player.x, this.player.y, lead.x, lead.y
            );
            if (dist < 60) nearLead = lead;
        });

        if (nearLead) {
            this.inspectPrompt.setPosition(nearLead.x, nearLead.y - 16).setVisible(true);
            if (Phaser.Input.Keyboard.JustDown(this.keyE)) {
                this._collectLead(nearLead);
                this.inspectPrompt.setVisible(false);
            }
        } else {
            this.inspectPrompt.setVisible(false);
        }

        // — Detección de proximidad: leads inválidos (trampa por contacto ~20px) —
        this.invalidLeads.forEach(lead => {
            if (!lead.alive) return;
            const dist = Phaser.Math.Distance.Between(
                this.player.x, this.player.y, lead.x, lead.y
            );
            if (dist < 22) this._touchInvalidLead(lead);
        });

        // — Actualizar HUD —
        this._drawHealthBar();
        this.scoreText.setText(`SCORE: ${this.score}`);
        this.leadsText.setText(`LEADS: ${this.leadsCollected}/4`);
        this.bonusText.setText(`BONUS: ${this.bonusEuros}€`);
    }
}


// ================================================================
//  SUMMARY SCENE
//  Muestra estadísticas del nivel al finalizar.
//  Recibe: { reason, leadsCollected, leadsTotal, invalidAvoided,
//            health, timeLeft, score, bonusEuros }
//  ENTER → vuelve al título (en it. futuras, irá al Mundo 2)
// ================================================================
class SummaryScene extends Phaser.Scene {
    constructor() { super({ key: 'SummaryScene' }); }

    create(data) {
        const W    = this.scale.width;
        const H    = this.scale.height;
        const FONT = 'Courier New, Courier, monospace';

        this.cameras.main.setBackgroundColor('#1a1a2e');

        // Título: usa el flag 'completed' que envía GameScene
        const titulo = data.completed ? '✅ MISIÓN COMPLETADA' : '⏰ TIEMPO AGOTADO';
        const tcolor = data.completed ? '#3DCD58' : '#f0a030';

        this.add.text(W / 2, H * 0.07, titulo, {
            fontSize: '22px', fill: tcolor, fontFamily: FONT, fontStyle: 'bold'
        }).setOrigin(0.5);

        this.add.text(W / 2, H * 0.18, `MUNDO ${currentWorld} — ${WORLD_DATA[currentWorld].nombre}`, {
            fontSize: '12px', fill: '#7a7a8e', fontFamily: FONT
        }).setOrigin(0.5);

        // Línea separadora
        const g = this.add.graphics();
        g.lineStyle(1, 0x3DCD58, 0.3);
        g.lineBetween(80, H * 0.25, W - 80, H * 0.25);

        // Tiempo formateado
        const tm = Math.floor(data.timeLeft / 60).toString().padStart(2, '0');
        const ts = (data.timeLeft % 60).toString().padStart(2, '0');

        // Hit rate (necesita 3/4 o 4/4 para aprobar)
        const hitRate  = Math.round((data.leadsCorrect / data.leadsTotal) * 100);
        const aprobado = data.completed && hitRate >= 75;

        // Tabla de estadísticas
        const stats = [
            {
                label: 'Leads detectados:',
                val:   `${data.leadsCollected}/${data.leadsTotal}`,
                col:   data.leadsCollected === data.leadsTotal ? '#3DCD58' : '#f0a030'
            },
            {
                label: 'Leads inválidos tocados:',
                val:   `${data.invalidTouched}/${currentWorld === 3 ? 4 : 2}`,
                col:   data.invalidTouched === 0 ? '#3DCD58' : '#e84057'
            },
            {
                label: 'Seguridad restante:',
                val:   `${data.health}%`,
                col:   data.health > 50 ? '#3DCD58' : data.health > 25 ? '#f0a030' : '#e84057'
            },
            {
                label: 'Tiempo restante:',
                val:   `${tm}:${ts}`,
                col:   '#e8e8f0'
            },
            {
                label: 'Puntuación:',
                val:   `${data.score} pts`,
                col:   '#e8e8f0'
            }
        ];

        const ROW_Y = H * 0.30;
        const ROW_H = 28;
        stats.forEach((st, i) => {
            this.add.text(W * 0.20, ROW_Y + i * ROW_H, st.label, {
                fontSize: '12px', fill: '#a0a0b8', fontFamily: FONT
            });
            this.add.text(W * 0.80, ROW_Y + i * ROW_H, st.val, {
                fontSize: '12px', fill: st.col, fontFamily: FONT, fontStyle: 'bold'
            }).setOrigin(1, 0);
        });

        // Hit rate — fila destacada
        const HR_Y = ROW_Y + stats.length * ROW_H + 6;
        this.add.text(W * 0.20, HR_Y, 'Hit Rate:', {
            fontSize: '13px', fill: '#a0a0b8', fontFamily: FONT, fontStyle: 'bold'
        });
        this.add.text(W * 0.80, HR_Y, `${hitRate}%  (${data.leadsCorrect}/${data.leadsTotal})`, {
            fontSize: '13px', fill: aprobado ? '#3DCD58' : '#e84057',
            fontFamily: FONT, fontStyle: 'bold'
        }).setOrigin(1, 0);

        // Bonus en grande
        const BOX_Y = HR_Y + 28;
        const bonusBox = this.add.graphics();
        bonusBox.fillStyle(0x0e1020, 0.85);
        bonusBox.fillRect(W * 0.25, BOX_Y, W * 0.50, 36);
        bonusBox.lineStyle(2, 0xf0a030, 0.9);
        bonusBox.strokeRect(W * 0.25, BOX_Y, W * 0.50, 36);
        this.add.text(W / 2, BOX_Y + 18, `Bonus estimado: ${data.bonus} €`, {
            fontSize: '16px', fill: '#f0a030', fontFamily: FONT, fontStyle: 'bold'
        }).setOrigin(0.5);

        // Mensaje de resultado (aprobado / no aprobado)
        const resultMsg = aprobado
            ? '✅ Hit rate objetivo alcanzado!\nAvanzas al siguiente site.'
            : '⚠ Tu hit rate no alcanza el 75%.\nTu supervisor te pide volver al site.';
        const resultColor = aprobado ? '#3DCD58' : '#f0a030';
        this.add.text(W / 2, BOX_Y + 58, resultMsg, {
            fontSize: '11px', fill: resultColor, fontFamily: FONT,
            align: 'center', lineSpacing: 4
        }).setOrigin(0.5);

        // Texto parpadeante — diferente si es el último mundo
        const blinkTxt = aprobado && currentWorld === 3
            ? '▶  Pulsa ENTER para la prueba final'
            : '▶  Pulsa ENTER para continuar';
        const blink = this.add.text(W / 2, H * 0.95, blinkTxt, {
            fontSize: '12px', fill: '#6de882', fontFamily: FONT
        }).setOrigin(0.5);
        this.tweens.add({ targets: blink, alpha: 0.15, duration: 550, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

        // ENTER: aprobado → siguiente mundo (o TitleScene si era el último)
        //        no aprobado → reinicia el mismo mundo
        this.time.delayedCall(200, () => {
            this.input.keyboard.once('keydown-ENTER', () => {
                if (aprobado) {
                    if (currentWorld < 3) {
                        playerHealth = data.health;   // llevar la vida al siguiente mundo
                        currentWorld++;
                        this.scene.start('BriefingScene');
                    } else {
                        playerHealth = 100;
                        this.scene.start('TitleScene'); // iteración 3: irá a BossScene
                    }
                } else {
                    // Fallo (hit rate < 75% o tiempo agotado) → reinicio desde Mundo 1
                    playerHealth = 100;
                    currentWorld = 1;
                    this.scene.start('BriefingScene');
                }
            });
        });
    }
}


// ================================================================
//  QUIZ SCENE
//  Overlay sobre GameScene. GameScene queda pausada mientras dura.
//  Recibe { quizId }. Al terminar emite 'quiz-complete' a GameScene
//  y se cierra sola, reanudando GameScene.
// ================================================================
class QuizScene extends Phaser.Scene {
    constructor() { super({ key: 'QuizScene' }); }

    create(data) {
        const W    = 800, H = 450;
        const FONT = 'Courier New, Courier, monospace';

        const quiz = WORLD_DATA[currentWorld].quizzes.find(q => q.id === data.quizId);
        if (!quiz) { this._close(false); return; }

        this.answered = false;
        this._quiz    = quiz;

        // — Layout constants —
        const BOX_X = 140, BOX_Y = 58, BOX_W = 520, BOX_H = 332;
        const OPT_X = 152, OPT_W = 496, OPT_H = 34, OPT_GAP = 8;
        const OPT_START_Y = BOX_Y + 142;

        // Guardar para _selectOption
        this._OPT_X       = OPT_X;
        this._OPT_W       = OPT_W;
        this._OPT_H       = OPT_H;
        this._OPT_GAP     = OPT_GAP;
        this._OPT_START_Y = OPT_START_Y;

        // ---- Overlay oscuro ----
        const ov = this.add.graphics();
        ov.fillStyle(0x000000, 0.85);
        ov.fillRect(0, 0, W, H);

        // ---- Caja central ----
        const box = this.add.graphics();
        box.fillStyle(0x12122a, 1);
        box.fillRect(BOX_X, BOX_Y, BOX_W, BOX_H);
        box.lineStyle(2, 0x3DCD58, 1);
        box.strokeRect(BOX_X, BOX_Y, BOX_W, BOX_H);

        // ---- Título ----
        this.add.text(W / 2, BOX_Y + 20, '🔍  ' + quiz.titulo, {
            fontSize: '13px', fill: '#3DCD58', fontFamily: FONT, fontStyle: 'bold'
        }).setOrigin(0.5);

        const sep = this.add.graphics();
        sep.lineStyle(1, 0x3DCD58, 0.35);
        sep.lineBetween(BOX_X + 20, BOX_Y + 42, BOX_X + BOX_W - 20, BOX_Y + 42);

        // ---- Pregunta ----
        this.add.text(W / 2, BOX_Y + 56, quiz.pregunta, {
            fontSize: '11px', fill: '#e8e8f0', fontFamily: FONT,
            align: 'center', wordWrap: { width: 460 }, lineSpacing: 4
        }).setOrigin(0.5, 0);

        // ---- Opciones ----
        this.optionRects = [];

        quiz.opciones.forEach((op, i) => {
            const oy = OPT_START_Y + i * (OPT_H + OPT_GAP);

            const rect = this.add.graphics();
            this._drawOptRect(rect, OPT_X, oy, OPT_W, OPT_H, 0x2d2d44, 0x4a4a5e, 1);
            this.optionRects.push(rect);

            // Número de tecla
            this.add.text(OPT_X + 14, oy + OPT_H / 2, `${i + 1}`, {
                fontSize: '11px', fill: '#7a7a8e', fontFamily: FONT, fontStyle: 'bold'
            }).setOrigin(0.5);

            // Texto de la opción
            this.add.text(OPT_X + 30, oy + OPT_H / 2, op.texto, {
                fontSize: '11px', fill: '#e8e8f0', fontFamily: FONT
            }).setOrigin(0, 0.5);

            // Zona interactiva invisible sobre el rectángulo
            const zone = this.add.zone(OPT_X, oy, OPT_W, OPT_H).setOrigin(0).setInteractive();
            zone.on('pointerover', () => {
                if (!this.answered)
                    this._drawOptRect(rect, OPT_X, oy, OPT_W, OPT_H, 0x3a3a5a, 0x6a6a9a, 1);
            });
            zone.on('pointerout', () => {
                if (!this.answered)
                    this._drawOptRect(rect, OPT_X, oy, OPT_W, OPT_H, 0x2d2d44, 0x4a4a5e, 1);
            });
            zone.on('pointerdown', () => this._selectOption(i));
        });

        // ---- Feedback (oculto hasta responder) ----
        this.feedbackText = this.add.text(
            W / 2, OPT_START_Y + 3 * (OPT_H + OPT_GAP) + 6, '', {
            fontSize: '11px', fill: '#3DCD58', fontFamily: FONT,
            align: 'center', wordWrap: { width: 470 }, lineSpacing: 3
        }).setOrigin(0.5, 0).setVisible(false);

        // ---- "Pulsa ENTER para continuar" (oculto hasta responder) ----
        this.continueText = this.add.text(W / 2, BOX_Y + BOX_H - 16, '▶  Pulsa ENTER para continuar', {
            fontSize: '11px', fill: '#6de882', fontFamily: FONT
        }).setOrigin(0.5, 1).setVisible(false);

        // ---- Teclado 1/2/3 ----
        this.input.keyboard.on('keydown', (e) => {
            if (this.answered) return;
            if (e.key === '1') this._selectOption(0);
            if (e.key === '2') this._selectOption(1);
            if (e.key === '3') this._selectOption(2);
        });
    }

    // ------------------------------------------------------------
    //  Dibuja o redibuja un rectángulo de opción
    // ------------------------------------------------------------
    _drawOptRect(gfx, x, y, w, h, fill, stroke, strokeAlpha) {
        gfx.clear();
        gfx.fillStyle(fill, 1);
        gfx.fillRect(x, y, w, h);
        gfx.lineStyle(1, stroke, strokeAlpha);
        gfx.strokeRect(x, y, w, h);
    }

    // ------------------------------------------------------------
    //  Procesa la selección de una opción
    // ------------------------------------------------------------
    _selectOption(index) {
        if (this.answered) return;
        this.answered = true;

        const quiz      = this._quiz;
        const selected  = quiz.opciones[index];
        const isCorrect = selected.correcto;
        const { _OPT_X: OX, _OPT_W: OW, _OPT_H: OH, _OPT_GAP: OG, _OPT_START_Y: OSY } = this;

        // Colorear opciones
        quiz.opciones.forEach((op, i) => {
            const oy   = OSY + i * (OH + OG);
            const rect = this.optionRects[i];
            if (i === index) {
                // La elegida: verde si correcta, roja si no
                this._drawOptRect(rect, OX, oy, OW, OH,
                    isCorrect ? 0x1a3a1a : 0x3a1a1a,
                    isCorrect ? 0x3DCD58 : 0xe84057, 1);
            } else if (op.correcto) {
                // Revelar la correcta en verde tenue
                this._drawOptRect(rect, OX, oy, OW, OH, 0x1a2e1a, 0x3DCD58, 0.6);
            } else {
                this._drawOptRect(rect, OX, oy, OW, OH, 0x2d2d44, 0x4a4a5e, 0.4);
            }
        });

        // Feedback
        const emoji = isCorrect ? '✅' : '❌';
        const label = isCorrect ? '¡Correcto!' : 'Incorrecto';
        this.feedbackText
            .setText(`${emoji} ${label} — ${selected.feedback}`)
            .setStyle({ fill: isCorrect ? '#3DCD58' : '#e84057' })
            .setVisible(true);

        // "Pulsa ENTER"
        this.continueText.setVisible(true);
        this.tweens.add({
            targets: this.continueText, alpha: 0.2,
            duration: 500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });

        // Registrar ENTER con delay para evitar disparo inmediato
        this.time.delayedCall(300, () => {
            this.input.keyboard.once('keydown-ENTER', () => this._close(isCorrect));
        });
    }

    // ------------------------------------------------------------
    //  Cierra la escena y comunica el resultado a GameScene
    // ------------------------------------------------------------
    _close(correct) {
        const gameScene = this.scene.get('GameScene');
        if (gameScene) gameScene.events.emit('quiz-complete', { correct });
        this.scene.stop('QuizScene');
        this.scene.resume('GameScene');
    }
}


// ================================================================
//  CONFIGURACIÓN DE PHASER
// ================================================================
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 450,
    backgroundColor: '#1a1a2e',
    parent: 'game',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 800 }, debug: false }
    },
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    scene: [ BootScene, TitleScene, BriefingScene, GameScene, QuizScene, SummaryScene ]
};

const game = new Phaser.Game(config);
</script>
